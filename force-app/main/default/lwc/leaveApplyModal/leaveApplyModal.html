<template>
    <template if:true={isOpen}>
        <div class="modal-overlay">
            <div class="modal-box">
                <div class="modal-header">
                    <h2>📅 Apply Leave</h2>
                    <button class="modal-close" onclick={closeModal}>✕</button>
                </div>
                <div class="modal-body">
                    <template if:true={errorMessage}>
                        <div class="error-banner">{errorMessage}</div>
                    </template>

                    <div class="form-group">
                        <label>Leave Type *</label>
                        <select class="form-select" value={leaveType} onchange={handleLeaveTypeChange}>
                            <option value="">Select Leave Type</option>
                            <option value="Paid Time Off">Paid Time Off</option>
                            <option value="Sick">Sick</option>
                            <option value="Bereavement">Bereavement</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Start Date *</label>
                            <input
                                type="date"
                                class="form-input"
                                value={startDate}
                                onchange={handleStartDateChange}
                            />
                        </div>
                        <div class="form-group">
                            <label>End Date *</label>
                            <input
                                type="date"
                                class="form-input"
                                value={endDate}
                                onchange={handleEndDateChange}
                            />
                        </div>
                    </div>

                    <template if:true={numberOfDays}>
                        <p class="days-badge">📆 {numberOfDays} day(s)</p>
                    </template>

                    <div class="form-group">
                        <label>Reason *</label>
                        <textarea
                            class="form-textarea"
                            value={reason}
                            onchange={handleReasonChange}
                            placeholder="Enter reason..."
                        ></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-cancel" onclick={closeModal} disabled={isSubmitting}>Cancel</button>
                    <button class="btn-submit" onclick={handleApplyLeave} disabled={isSubmitting}>
                        Apply Leave
                    </button>
                </div>
            </div>
        </div>
    </template>
</template>
