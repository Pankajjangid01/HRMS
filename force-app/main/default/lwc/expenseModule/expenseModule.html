<template>
    <div class="expense-page">

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="loading-wrap">
                <lightning-spinner
                    alternative-text="Loading"
                    size="medium">
                </lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>

            <!-- Header -->
            <div class="page-header">
                <h2 class="page-title">My Expenses</h2>
                <button class="btn-new-expense"
                    onclick={openModal}>
                    + New Expense
                </button>
            </div>

            <!-- Expense Cards -->
            <template if:true={hasExpenses}>
                <div class="expense-cards-grid">
                    <template for:each={expenses}
                        for:item="exp">
                        <div key={exp.Id} class="expense-card">
                            <div class="exp-card-header">
                                <span class="exp-title">
                                    {exp.Claim_Title__c}
                                </span>
                                <span class={exp.statusClass}>
                                    {exp.Status__c}
                                </span>
                            </div>
                            <div class="exp-card-body">
                                <div class="exp-row">
                                    <span class="exp-label">📅 Date</span>
                                    <span>{exp.Expense_Date__c}</span>
                                </div>
                                <div class="exp-row">
                                    <span class="exp-label">💰 Amount</span>
                                    <span class="exp-amount">
                                        ₹{exp.Total_Amount__c}
                                    </span>
                                </div>
                            </div>
                            <div class="exp-card-footer">
                                <button class="btn-view-receipt"
                                    data-id={exp.Id}
                                    onclick={handleViewReceipt}>
                                    View Receipt
                                </button>
                                <template if:true={exp.canCancel}>
                                    <button class="btn-cancel-exp"
                                        data-id={exp.Id}
                                        onclick={handleCancelExpense}>
                                        Cancel
                                    </button>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <template if:false={hasExpenses}>
                <div class="empty-state">
                    No expenses yet. Click "+ New Expense" to submit one.
                </div>
            </template>

        </template>

    </div>

    <!-- ── EXPENSE MODAL ──────────────────────── -->
    <template if:true={showModal}>
        <div class="modal-overlay" onclick={closeModal}>
            <div class="modal" onclick={stopProp}>

                <div class="modal-header">
                    <span>New Expense Claim</span>
                    <button class="modal-close"
                        onclick={closeModal}>✕</button>
                </div>

                <div class="modal-body">

                    <div class="form-row">
                        <div class="form-group">
                            <label>Claim Title *</label>
                            <input type="text"
                                class="form-control"
                                value={claimTitle}
                                onchange={handleClaimTitleChange}
                                placeholder="e.g. Client Visit Delhi" />
                        </div>
                        <div class="form-group">
                            <label>Expense Date *</label>
                            <input type="date"
                                class="form-control"
                                value={expenseDate}
                                onchange={handleExpenseDateChange} />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Remarks</label>
                        <textarea
                            class="form-control"
                            rows="2"
                            value={remarks}
                            onchange={handleRemarksChange}
                            placeholder="Optional notes...">
                        </textarea>
                    </div>

                    <!-- Line Items -->
                    <div class="line-items-header">
                        <span class="line-items-label">
                            Line Items
                        </span>
                        <button class="btn-add-line"
                            onclick={handleAddLineItem}>
                            + Add Item
                        </button>
                    </div>

                    <div class="line-table">
                        <div class="line-head">
                            <span>Category</span>
                            <span>Description</span>
                            <span>Amount (₹)</span>
                            <span></span>
                        </div>
                        <template for:each={lineItems}
                            for:item="item"
                            for:index="idx">
                            <div key={item.key}
                                class="line-row">
                                <select
                                    class="form-sm"
                                    data-index={idx}
                                    onchange={handleCategoryChange}>
                                    <option value="">Select</option>
                                    <option value="Travel">Travel</option>
                                    <option value="Meals">Meals</option>
                                    <option value="Accommodation">Accommodation</option>
                                    <option value="Office Supplies">Office Supplies</option>
                                    <option value="Training">Training</option>
                                    <option value="Medical">Medical</option>
                                    <option value="Other">Other</option>
                                </select>
                                <input type="text"
                                    class="form-sm"
                                    placeholder="Description"
                                    value={item.description}
                                    data-index={idx}
                                    onchange={handleDescriptionChange} />
                                <input type="number"
                                    class="form-sm"
                                    placeholder="0.00"
                                    value={item.amount}
                                    data-index={idx}
                                    onchange={handleAmountChange} />
                                <button
                                    class="btn-rm-line"
                                    data-index={idx}
                                    onclick={handleRemoveLineItem}>
                                    ✕
                                </button>
                            </div>
                        </template>
                    </div>

                    <div class="exp-total">
                        Total: <strong>₹{totalAmount}</strong>
                    </div>

                    <!-- Receipt Upload -->
                    <div class="form-group">
                        <label>Receipt * (PDF/JPG/PNG)</label>
                        <template if:true={receiptUploaded}>
                            <div class="receipt-ok">
                                ✅ Receipt uploaded
                            </div>
                        </template>
                        <template if:false={receiptUploaded}>
                            <lightning-file-upload
                                name="receiptUpload"
                                accept={acceptedFormats}
                                onuploadfinished={handleUploadFinished}
                                multiple="false">
                            </lightning-file-upload>
                            <p class="receipt-warn">
                                ⚠️ Receipt is required
                            </p>
                        </template>
                    </div>

                    <template if:true={modalError}>
                        <div class="modal-err">
                            {modalError}
                        </div>
                    </template>

                </div>

                <div class="modal-footer">
                    <button class="btn-modal-cancel"
                        onclick={closeModal}>
                        Cancel
                    </button>
                    <button class="btn-modal-submit"
                        disabled={isSubmitDisabled}
                        onclick={handleSubmitExpense}>
                        Submit Expense
                    </button>
                </div>

            </div>
        </div>
    </template>

</template>
