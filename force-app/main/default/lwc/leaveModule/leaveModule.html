<template>
    <div class="leave-container">

        <!-- Loader -->
        <template if:true={isLoading}>
            <lightning-spinner
                alternative-text="Loading"
                size="medium">
            </lightning-spinner>
        </template>

        <template if:false={isLoading}>

            <!-- Success Message -->
            <template if:true={successMessage}>
                <div class="success-box">
                    <p>{successMessage}</p>
                </div>
            </template>

            <!-- Error Message -->
            <template if:true={errorMessage}>
                <div class="error-box">
                    <p>{errorMessage}</p>
                </div>
            </template>

            <!-- Leave Balance -->
            <lightning-card title="My Leave Balance">

                <div class="balance-item">
                    <span>
                        Paid Time Off —
                        Total: {leaveBalance.PTO_Total__c}
                        |
                        Used: {leaveBalance.PTO_Used__c}
                        |
                        Remaining:
                        {leaveBalance.PTO_Remaining__c}
                    </span>
                </div>

                <div class="balance-item">
                    <span>
                        Sick —
                        Total: {leaveBalance.Sick_Total__c}
                        |
                        Used: {leaveBalance.Sick_Used__c}
                        |
                        Remaining:
                        {leaveBalance.Sick_Remaining__c}
                    </span>
                </div>

                <div class="balance-item">
                    <span>
                        Bereavement —
                        Total:
                        {leaveBalance.Bereavement_Total__c}
                        |
                        Used:
                        {leaveBalance.Bereavement_Used__c}
                        |
                        Remaining:
                        {leaveBalance.Bereavement_Remaining__c}
                    </span>
                </div>

            </lightning-card>

            <!-- Apply Leave -->
            <lightning-card title="Apply Leave">

                <lightning-combobox
                    label="Leave Type"
                    value={leaveType}
                    options={leaveTypeOptions}
                    onchange={handleLeaveTypeChange}>
                </lightning-combobox>

                <lightning-input
                    type="date"
                    label="Start Date"
                    value={startDate}
                    onchange={handleStartDateChange}>
                </lightning-input>

                <lightning-input
                    type="date"
                    label="End Date"
                    value={endDate}
                    onchange={handleEndDateChange}>
                </lightning-input>

                <template if:true={numberOfDays}>
                    <p class="days-text">
                        Number of Days:
                        {numberOfDays}
                    </p>
                </template>

                <lightning-textarea
                    label="Reason"
                    value={reason}
                    onchange={handleReasonChange}>
                </lightning-textarea>

                <lightning-button
                    label="Apply Leave"
                    variant="brand"
                    onclick={handleApplyLeave}>
                </lightning-button>

            </lightning-card>

            <!-- Leave Requests -->
            <lightning-card title="My Leave Requests">

                <template if:true={hasLeaveRequests}>

                    <template
                        for:each={leaveRequests}
                        for:item="request">

                        <div
                            key={request.Id}
                            class="request-item">

                            <span>
                                {request.Leave_Type__c}
                            </span>

                            |

                            <span>
                                {request.Start_Date__c}
                            </span>

                            to

                            <span>
                                {request.End_Date__c}
                            </span>

                            |

                            <span>
                                {request.Number_Of_Days__c}
                                days
                            </span>

                            |

                            <span>
                                {request.Status__c}
                            </span>

                            <template
                                if:true={request.canCancel}>

                                <lightning-button
                                    label="Cancel"
                                    variant="destructive"
                                    data-id={request.Id}
                                    onclick={handleCancelLeave}>
                                </lightning-button>

                            </template>

                        </div>

                    </template>

                </template>

                <template if:false={hasLeaveRequests}>
                    <p class="empty-text">
                        No leave requests found.
                    </p>
                </template>

            </lightning-card>

        </template>

    </div>
</template>
