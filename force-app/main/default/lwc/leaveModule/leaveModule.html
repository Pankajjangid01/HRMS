<template>
    <div class="leave-page">

        <!-- Loader -->
        <template if:true={isLoading}>
            <div class="loading-wrap">
                <lightning-spinner
                    alternative-text="Loading"
                    size="medium">
                </lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="page-header">
                <h2 class="page-title">My Leaves</h2>
                <button class="btn-new-leave" onclick={openLeaveModal}>
                    + Apply Leave
                </button>
            </div>

            <!-- Success Message -->
            <template if:true={successMessage}>
                <div class="msg-success">
                    <p>{successMessage}</p>
                </div>
            </template>

            <!-- Error Message -->
            <template if:true={errorMessage}>
                <div class="msg-error">
                    <p>{errorMessage}</p>
                </div>
            </template>

            <!-- Leave Requests -->
            <template if:true={hasLeaveRequests}>
                <div class="leave-list">
                    <template
                        for:each={leaveRequests}
                        for:item="request">
                        <div
                            key={request.Id}
                            class="leave-row">
                            <div class="leave-main">
                                <div class="leave-top">
                                    <div class="leave-type">{request.Leave_Type__c}</div>
                                    <span class={request.statusClass}>
                                        {request.Status__c}
                                    </span>
                                </div>
                                <div class="leave-meta">
                                    <span>📅 {request.Start_Date__c} to {request.End_Date__c}</span>
                                    <span>⏱ {request.Number_Of_Days__c} day(s)</span>
                                </div>
                                <template if:true={request.Reason__c}>
                                    <div class="leave-reason">
                                        {request.Reason__c}
                                    </div>
                                </template>
                            </div>

                            <template if:true={request.canCancel}>
                                <div class="leave-actions">
                                    <button
                                        class="btn-cancel-leave"
                                        data-id={request.Id}
                                        onclick={handleCancelLeave}>
                                        Cancel
                                    </button>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <template if:false={hasLeaveRequests}>
                <div class="empty-state">
                    No leave requests yet. Click "+ Apply Leave" to submit one.
                </div>
            </template>

        </template>

        <c-leave-apply-modal onsuccess={handleLeaveApplied}></c-leave-apply-modal>

    </div>
</template>
